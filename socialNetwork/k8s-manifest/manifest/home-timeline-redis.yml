apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-timeline-redis
  namespace: social-network
  labels:
    app: home-timeline-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-timeline-redis
  template:
    metadata:
      labels:
        app: home-timeline-redis
    spec:

      initContainers:
        - name: wait-for-jaeger-agent
          image: busybox
          command: ["sh", "-c", "until nc -z jaeger-agent 6831; do echo waiting for Jaeger Agent; sleep 5; done;"]

        - name: wait-for-jaeger-query
          image: busybox
          command: ["sh", "-c", "until nc -z jaeger-query 16686; do echo waiting for Jaeger Query; sleep 5; done;"]

      containers:
        - name: redis
          image: redis
          command: ["redis-server", "/social-network-microservices/config/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: config-volume
              mountPath: /social-network-microservices/config
            - name: keys-volume
              mountPath: /keys
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: config-volume
          hostPath:
            path: /users/pianwan/DeathStarBench/socialNetwork/config

        - name: keys-volume
          hostPath:
            path: /users/pianwan/DeathStarBench/socialNetwork/keys
---
apiVersion: v1
kind: Service
metadata:
  name: home-timeline-redis
  namespace: social-network
spec:
  selector:
    app: home-timeline-redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP